services:
  dotnet-service:
    build:
      context: ..
      dockerfile: docker/services/dotnet/Dockerfile
      target: dev
    volumes:
      - ../src/dotnet-core/NormaQ:/app
      - dotnet-build:/app/obj
      - dotnet-bin:/app/bin
      - nuget-cache:/root/.nuget/packages
      - ../db/sqlserver:/scripts/sqlserver:ro
    working_dir: /app
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  dotnet-build:
  dotnet-bin:
  nuget-cache:

networks:
  app-network:
    external: true