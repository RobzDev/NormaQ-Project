services:

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../src/php-app:/var/www/html
    depends_on:
      - dotnet-service
      - php-service

  dotnet-service:
    build:
      context: .
      dockerfile: ./services/dotnet/Dockerfile
    volumes:
      - ../src/dotnet-core/NormaQ:/app
    working_dir: /app
    command: dotnet watch run --urls http://0.0.0.0:80

  php-service:
    build:
      context: .
      dockerfile: ./services/laravel/Dockerfile
    volumes:
      - ../src/php-app:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  # =========================
  # SQL Server
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ../db/sqlserver:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10

  # =========================
  # PostgreSQL
  # =========================
  pgsql:
    image: postgres:15
    container_name: pgsql
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
      - ../db/pgsql:/scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 10s
      retries: 10

  # =========================
  # INIT MULTI-DB
  # =========================
  init-service:
    build:
      context: .
      dockerfile: ./init.Dockerfile
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DB: ${PG_DB}
    depends_on:
      sqlserver:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    volumes:
      - ../db/sqlserver:/scripts/sqlserver
      - ../db/pgsql:/scripts/pgsql
      - ./init.sh:/init.sh
    entrypoint: ["/bin/bash", "/init.sh"]

volumes:
  sqlserver_data:
  pgsql_data: