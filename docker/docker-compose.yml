services:




  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../src/php-app:/var/www/html
    depends_on:
      - dotnet-service
      - php-service

  dotnet-service:
    build:
      context: .
      dockerfile: ./services/dotnet/Dockerfile
    volumes:
      - ../src/dotnet-core/NormaQ:/app
    working_dir: /app
    command: dotnet watch run --urls http://0.0.0.0:80

  php-service:
    build:
      context: .
      dockerfile: ./services/laravel/Dockerfile
    volumes:
      - ../src/php-app:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  #python-service:
   # build:
    #  context: .
     # dockerfile: ./Docker/services/fastapi/Dockerfile
    #volumes:
      #- ./src/fastapi:/app
    # No exponemos puertos al exterior (localhost:8000 fallará, que es lo que quieres)





  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ../db/sqlserver:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "//opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ../db/sqlserver:/scripts
    entrypoint: >
     /bin/bash -c "
      echo 'Esperando SQL Server...' &&
      sleep 5 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${SA_PASSWORD} -C -i /scripts/init.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${SA_PASSWORD} -C -i /scripts/seeding.sql &&
      echo 'Base de datos inicializada correctamente'
                "

volumes:
  sqlserver_data:   