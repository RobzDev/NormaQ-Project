services:

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../src/php-app:/var/www/html
    depends_on:
      - dotnet-service
      - php-service
    networks:
      - app-network


  dotnet-service:
    build:
      context: .
      dockerfile: ./services/dotnet/Dockerfile
    volumes:
      - ../src/dotnet-core/NormaQ:/app
      - ../db/sqlserver:/scripts/sqlserver:ro
    working_dir: /app
    depends_on:
      sqlserver:
         condition: service_healthy
      redis: 
          condition: service_healthy
      
    command: >
      sh -c "dotnet restore && dotnet watch run --non-interactive -- --urls http://0.0.0.0:80"

    networks:
      - app-network

  php-service:
    build:
        context: .
        dockerfile: ./services/laravel/Dockerfile

    user: "${UID:-1000}:${GID:-1000}"

    volumes:
    - ../src/php-app:/var/www/html

    depends_on:
      pgsql:
       condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      - APP_ENV=local
      - APP_DEBUG=true

    command: >
      sh -c "
        php -r 'while(!@fsockopen(\"pgsql\",5432)){echo \"Esperando a Postgres...\n\";sleep(1);}';

        composer install --no-interaction --prefer-dist --optimize-autoloader;

        if ! grep -q '^APP_KEY=base64:' .env; then
        php artisan key:generate --force --no-interaction;
        fi;

        php artisan migrate --force --no-interaction;

        php-fpm -F
      "

    networks:
      - app-network

  # =========================
  # SQL Server
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ../db/sqlserver:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10
    networks:
      - app-network
  # =========================
  # PostgreSQL
  # =========================
  pgsql:
    image: postgres:15
    container_name: pgsql
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
      - ../db/pgsql:/scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network  


# =========================
  # Redis
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

# =========================
  # MinIO
  # =========================
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Consola web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
    networks:
      - app-network





  # =========================
  # INIT MULTI-DB
  # =========================
  

volumes:
  sqlserver_data:
  pgsql_data:
  minio_data:


networks:
  app-network:
    driver: bridge