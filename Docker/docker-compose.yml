services:
  # 1. Reverse Proxy
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - master-csharp
      - app-php

  # 2. C# Master con Hot Reload (Compilado)
  master-csharp:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: master-csharp
    volumes:
      - ./master-csharp:/app # Bind Mount del código
    working_dir: /app
    # 'dotnet watch' detecta cambios en el host y recompila internamente
    command: dotnet watch run --urls http://0.0.0.0:80
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=1 # Necesario para detectar cambios en Docker Desktop

  # 3. PHP Laravel (Interpretado)
  app-php:
    image: php:8.2-fpm-alpine
    container_name: app-php
    volumes:
      - ./app-php:/var/www/html # Bind Mount del código
    # PHP no necesita comando especial de recarga, lee el disco en cada request

  # 4. Python FastAPI con Autoreload (Interpretado)
  internal-python:
    image: python:3.11-slim
    container_name: internal-python
    ports:
      - "8000:8000" # Exponemos solo en desarrollo para pruebas directas
    volumes:
      - ./internal-python:/app # Bind Mount del código
    working_dir: /app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    # '--reload' vigila los archivos .py y reinicia el proceso uvicorn
    command: >
      sh -c "pip install fastapi uvicorn && 
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"