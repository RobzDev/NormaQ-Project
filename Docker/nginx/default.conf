# Definición de los servidores internos
upstream master_csharp {
    server master-csharp:80;
}

upstream app_php {
    server app-php:9000; # Puerto estándar de PHP-FPM
}

server {
    listen 80;
    server_name localhost;

    # Servicio Maestro (C#) - Maneja el root
    location / {
        proxy_pass http://master_csharp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Servicio PHP - Solo accesible si C# redirige aquí o vía URL directa
    location /php-app/ {
        # Reescribimos el path para que PHP no reciba /php-app/
        rewrite ^/php-app/(.*)$ /$1 break;
        
        include fastcgi_params;
        fastcgi_pass app_php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
    }
}



